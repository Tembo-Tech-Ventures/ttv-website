# simple docker-compose with a single postgres db

version: '3.1'

services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: user
      POSTGRES_DB: database
    ports:
      - 5432:5432
    volumes:
      - ./.data/db:/var/lib/postgresql/data

  mailer:
    image: mailhog/mailhog
    ports:
      - 8025:8025
      - 1025:1025

  s3:
    image: adobe/s3mock
    ports:
      - 9090:9090
    environment:
      - initialBuckets=ttv-application-files
      - debug=true