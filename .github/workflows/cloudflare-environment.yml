name: Cloudflare Environment

on:
  workflow_call:
    inputs:
      action:
        required: true
        type: string
      environment_name:
        required: true
        type: string
      app_name:
        required: false
        type: string
        default: ttv-website
      primary_domain:
        required: false
        type: string
        default: ""
      redirect_domain:
        required: false
        type: string
        default: ""
      better_auth_url:
        required: false
        type: string
        default: ""
      workers_subdomain:
        required: false
        type: string
        default: ""
      d1_jurisdiction:
        required: false
        type: string
        default: ""
      r2_jurisdiction:
        required: false
        type: string
        default: ""
      r2_location_hint:
        required: false
        type: string
        default: ""
      protected_environments:
        required: false
        type: string
        default: production,prod
      allow_protected_destroy:
        required: false
        type: boolean
        default: false
      github_environment:
        required: false
        type: string
        default: ""

jobs:
  cloudflare-with-environment:
    if: ${{ inputs.github_environment != '' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.github_environment }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: web
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      GITHUB_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
      GITHUB_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
      CLOUDFLARE_APP_NAME: ${{ inputs.app_name }}
      CLOUDFLARE_ENVIRONMENT_NAME: ${{ inputs.environment_name }}
      CLOUDFLARE_PRIMARY_DOMAIN: ${{ inputs.primary_domain }}
      CLOUDFLARE_REDIRECT_DOMAIN: ${{ inputs.redirect_domain }}
      CLOUDFLARE_BETTER_AUTH_URL: ${{ inputs.better_auth_url }}
      CLOUDFLARE_WORKERS_SUBDOMAIN: ${{ inputs.workers_subdomain }}
      CLOUDFLARE_D1_JURISDICTION: ${{ inputs.d1_jurisdiction }}
      CLOUDFLARE_R2_JURISDICTION: ${{ inputs.r2_jurisdiction }}
      CLOUDFLARE_R2_LOCATION_HINT: ${{ inputs.r2_location_hint }}
      CLOUDFLARE_PROTECTED_ENVIRONMENTS: ${{ inputs.protected_environments }}
      CLOUDFLARE_ALLOW_PROTECTED_DESTROY: ${{ inputs.allow_protected_destroy }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci --legacy-peer-deps

      - if: ${{ inputs.action == 'deploy' }}
        run: npm run cf:deploy

      - if: ${{ inputs.action == 'destroy' }}
        run: npm run cf:destroy

  cloudflare:
    if: ${{ inputs.github_environment == '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: web
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      GITHUB_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
      GITHUB_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
      CLOUDFLARE_APP_NAME: ${{ inputs.app_name }}
      CLOUDFLARE_ENVIRONMENT_NAME: ${{ inputs.environment_name }}
      CLOUDFLARE_PRIMARY_DOMAIN: ${{ inputs.primary_domain }}
      CLOUDFLARE_REDIRECT_DOMAIN: ${{ inputs.redirect_domain }}
      CLOUDFLARE_BETTER_AUTH_URL: ${{ inputs.better_auth_url }}
      CLOUDFLARE_WORKERS_SUBDOMAIN: ${{ inputs.workers_subdomain }}
      CLOUDFLARE_D1_JURISDICTION: ${{ inputs.d1_jurisdiction }}
      CLOUDFLARE_R2_JURISDICTION: ${{ inputs.r2_jurisdiction }}
      CLOUDFLARE_R2_LOCATION_HINT: ${{ inputs.r2_location_hint }}
      CLOUDFLARE_PROTECTED_ENVIRONMENTS: ${{ inputs.protected_environments }}
      CLOUDFLARE_ALLOW_PROTECTED_DESTROY: ${{ inputs.allow_protected_destroy }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci --legacy-peer-deps

      - if: ${{ inputs.action == 'deploy' }}
        run: npm run cf:deploy

      - if: ${{ inputs.action == 'destroy' }}
        run: npm run cf:destroy
