name: Cloudflare Staging PR Deploy

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

jobs:
  staging:
    uses: ./.github/workflows/cloudflare-environment.yml
    with:
      action: deploy
      environment_name: staging
      github_environment: staging
      primary_domain: staging.tembotechventures.com
      redirect_domain: ${{ vars.STAGING_REDIRECT_DOMAIN }}
      better_auth_url: ${{ vars.STAGING_BETTER_AUTH_URL }}
      workers_subdomain: ${{ vars.CLOUDFLARE_WORKERS_SUBDOMAIN }}
      protected_environments: production,prod
    secrets: inherit
